<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - DevFinance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="login-container">
    <form class="login-card" onsubmit="login(event)">
      <h1>DevFinance</h1>
      <p>Entre na sua conta</p>

      <input id="email" type="email" placeholder="Seu email" required>
      <input id="password" type="password" placeholder="Sua senha" required>

      <button type="submit">Entrar</button>
      <button type="button" class="btn-secundario" onclick="register()">Criar conta</button>
    </form>
  </main>

  <script>
    const API_AUTH = "https://devfinance-1.onrender.com";

    async function login(event) {
      event.preventDefault();

      const res = await fetch(`${API_AUTH}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: email.value,
          password: password.value
        })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "index.html";
      } else {
        alert("Email ou senha inválidos");
      }
    }

    async function register() {
      const res = await fetch(`${API_AUTH}/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: email.value,
          password: password.value
        })
      });

      if (res.ok) {
        alert("Conta criada com sucesso!");
      } else {
        alert("Usuário já existe");
      }
    }
  </script>

</body>
</html>
